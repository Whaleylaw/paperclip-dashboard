## Render Blueprint for Paperclip
##
## Deploys Paperclip as a Docker web service backed by a Render-managed
## PostgreSQL database and a persistent disk for instance data, uploads,
## and secrets.
##
## Usage:
##   1. Push this file to your repository.
##   2. In Render, click "New +" -> "Blueprint" and point it at this repo.
##   3. Render will provision the database and service. First build takes a
##      while because the Dockerfile does a full pnpm install.
##   4. After the service is live, open it and complete the first-run
##      bootstrap to create your instance admin.
##
## See doc/RENDER.md for the full walkthrough.

databases:
  - name: paperclip-db
    plan: basic-256mb
    databaseName: paperclip
    user: paperclip
    postgresMajorVersion: "17"

services:
  - type: web
    name: paperclip
    runtime: docker
    plan: standard
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: paperclip-data
      mountPath: /paperclip
      sizeGB: 10
    envVars:
      # --- Database ---
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString

      # --- Secrets (generated once, stored by Render) ---
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: PAPERCLIP_AGENT_JWT_SECRET
        generateValue: true

      # --- Runtime wiring ---
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3100"
      - key: SERVE_UI
        value: "true"

      # --- Paperclip deployment mode ---
      # "public" exposure so the Render-issued HTTPS URL can actually be used
      # by browsers/auth callbacks from anywhere.
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_INSTANCE_ID
        value: default
      - key: PAPERCLIP_CONFIG
        value: /paperclip/instances/default/config.json

      # PAPERCLIP_PUBLIC_URL is auto-derived from RENDER_EXTERNAL_URL by
      # scripts/docker-entrypoint.sh on first start. To use a custom domain,
      # override this value in the Render dashboard after adding the domain.
      - key: PAPERCLIP_PUBLIC_URL
        sync: false

      # --- Optional: agent API keys ---
      # Uncomment and set these in the Render dashboard to enable the local
      # Claude / Codex / OpenAI adapters bundled in the Docker image.
      # - key: ANTHROPIC_API_KEY
      #   sync: false
      # - key: OPENAI_API_KEY
      #   sync: false

      # --- Telemetry ---
      - key: PAPERCLIP_TELEMETRY_DISABLED
        value: "1"
